<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="DPUnity company workspace">
  <title>DPUnity Workspace</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <a class="brand-link" href="./index.html">DPUnity</a>
      <nav>
        <a href="./index.html">Portal</a>
        <a href="./admin.html">Admin</a>
      </nav>
    </header>

    <section class="workspace">
      <div class="section-head">
        <div>
          <p class="eyebrow">Workspace</p>
          <h1 id="workspaceCompanyName">Đang tải</h1>
          <p class="muted" id="workspaceUser"></p>
        </div>
        <a class="secondary nav-button" href="./index.html">Đổi công ty</a>
      </div>
      <p class="message" id="workspaceMessage" role="status" aria-live="polite"></p>
    </section>

    <section class="workspace-tabs hidden" id="workspaceTabs">
      <button class="tab active" type="button" data-view="dashboard">Dashboard</button>
      <button class="tab" type="button" data-view="people">Nhân sự</button>
      <button class="tab" type="button" data-view="notes">Sticky Note</button>
    </section>

    <section class="workspace" id="dashboardView">
      <div id="dashboardContent"></div>
    </section>

    <section class="workspace hidden" id="notesView">
      <div class="section-head">
        <div>
          <p class="eyebrow">Sticky Notes</p>
          <h2>Ghi chú công ty</h2>
        </div>
      </div>
      <form class="inline-form" id="stickyForm">
        <input type="hidden" name="id">
        <label>Tiêu đề<input name="title" type="text" placeholder="Công việc cần nhớ"></label>
        <label>Màu nền<input name="color" type="color" value="#fff7ad"></label>
        <fieldset class="wide-field">
          <legend>Quyền xem</legend>
          <div class="check-grid" id="noteViewerList"></div>
        </fieldset>
        <label class="wide-field">Nội dung<textarea name="content" rows="4" required></textarea></label>
        <div class="button-row">
          <button class="primary" type="submit">Lưu note</button>
          <button class="secondary" id="resetStickyButton" type="button">Mới</button>
        </div>
      </form>
      <div class="sticky-grid" id="stickyList"></div>
    </section>

    <section class="workspace hidden" id="peopleView">
      <div class="section-head">
        <div>
          <p class="eyebrow">People</p>
          <h2>Quản lý nhân sự</h2>
        </div>
      </div>
      <form class="inline-form" id="memberForm">
        <label>Email thành viên<input name="email" type="email" placeholder="user@company.com" required></label>
        <label>Vai trò
          <select name="role">
            <option value="member">Member</option>
            <option value="rootadmin">Root admin</option>
          </select>
        </label>
        <div class="button-row">
          <button class="primary" type="submit">Thêm thành viên</button>
        </div>
      </form>
      <div class="table-wrap" id="memberList"></div>
    </section>
  </main>

  <script src="./ui.js?v=20260613-vi-diacritics"></script>
  <script src="./config.js"></script>
  <script src="./workspace.js?v=20260613-vi-diacritics"></script>
</body>
</html>
